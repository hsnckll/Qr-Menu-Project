<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Menü</title>
  <meta name="description" content="Dijital menümüze hoş geldiniz">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo-wrap">
        <img id="shop-logo" src="" alt="Logo" style="display:none">
        <span id="logo-placeholder" class="logo-placeholder">🏪</span>
      </div>
      <div class="shop-info">
        <h1 id="shop-name">Dükkanım</h1>
        <p> Dijital Menü</p>
      </div>
      <button id="header-about-btn" class="header-about-btn">📍 Hakkımızda</button>
    </div>
  </header>

  <!-- ===== CATEGORY TABS ===== -->
  <nav class="categories-section" aria-label="Kategoriler">
    <div class="categories-inner" id="category-tabs">
      <!-- JS tarafından doldurulur, "Hakkımızda" sabit olarak eklenecek -->
    </div>
  </nav>

  <!-- ===== PRODUCTS ===== -->
  <main class="products-section" id="products-main">
    <div class="section-header-bar">
      <span id="section-icon" class="section-icon"></span>
      <h2 class="section-title" id="section-title">Ürünler</h2>
      <span class="section-count" id="section-count"></span>
    </div>
    <div class="product-grid" id="product-grid"></div>
  </main>

  <!-- ===== HAKKIMIZDA ===== -->
  <section class="about-section" id="about-section">
    <div class="section-header-bar">
      <span class="section-icon">📍</span>
      <h2 class="section-title">Hakkımızda</h2>
    </div>

    <div class="about-grid" id="about-grid">

      <!-- Hakkında -->
      <div class="about-card" id="about-info-card">
        <div class="about-card-title">🏪 Dükkan Hakkında</div>
        <p class="about-description" id="about-description">Yükleniyor...</p>
      </div>

      <!-- İletişim -->
      <div class="about-card" id="about-contact-card">
        <div class="about-card-title">📞 İletişim & Adres</div>
        <ul class="about-contact-list" id="about-contact-list"></ul>
      </div>

      <!-- Harita -->
      <div class="about-map-wrap" id="about-map-wrap"></div>

    </div>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <p>© </span> Hasan Çakallı</p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/menu.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>

</html>
